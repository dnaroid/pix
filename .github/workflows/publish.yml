name: Publish

on:
  push:
    branches: [master]
    tags:
      - "v*"
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Check/build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - uses: oven-sh/setup-bun@v2
        if: runner.os != 'Windows'
      - name: Install Bun on Windows
        if: runner.os == 'Windows'
        run: npm install -g bun@1.3.14
      - run: bun --version
      - uses: jdx/mise-action@v2
      - run: npm ci --ignore-scripts
      - run: npm run check
      - run: npm run test:tools-suite
      - run: npm run build:pix

  package-smoke-test:
    needs: build-and-test
    name: Package smoke test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - uses: jdx/mise-action@v2
      - run: npm ci --ignore-scripts
      - name: Smoke-test packed tarball
        run: npm run smoke-test

  publish:
    needs: package-smoke-test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
          registry-url: https://registry.npmjs.org
      - uses: jdx/mise-action@v2
      - run: npm ci --ignore-scripts
      - run: npm run check
      - run: npm run build:pix
      - name: Verify package version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [[ "$PACKAGE_VERSION" != "$TAG_VERSION" ]]; then
            echo "package.json version ($PACKAGE_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
